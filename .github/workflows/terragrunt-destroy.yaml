# ---------------------------------------------------------------------------
# Reusable Workflow: Terragrunt Destroy (for infra-live repos)
#
# Called by team repos' destroy.yaml (manual workflow_dispatch).
# Confirms environment name, then runs terragrunt destroy.
# ---------------------------------------------------------------------------
name: Terragrunt Destroy

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (e.g. prod, dev)"
        required: true
        type: string
      working_directory:
        description: "Path to the terragrunt module dir"
        required: true
        type: string
      confirm_environment:
        description: "Type the environment name to confirm destruction"
        required: true
        type: string
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.10.0"
      terragrunt_version:
        description: "Terragrunt version"
        required: false
        type: string
        default: "0.67.0"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  confirm:
    name: Confirm Destruction
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm_environment }}" != "${{ inputs.environment }}" ]; then
            echo "::error::Environment confirmation mismatch. Expected '${{ inputs.environment }}', got '${{ inputs.confirm_environment }}'."
            exit 1
          fi
          echo "Destruction confirmed for: ${{ inputs.working_directory }} (${{ inputs.environment }})"

  destroy:
    name: Terragrunt Destroy
    runs-on: ubuntu-latest
    needs: [confirm]
    environment: ${{ inputs.environment }}-destroy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: tg-destroy-${{ inputs.environment }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ inputs.terragrunt_version }}

      - name: Terragrunt Init
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt init --terragrunt-non-interactive

      - name: Terragrunt Plan Destroy
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt plan -destroy -no-color --terragrunt-non-interactive

      - name: Terragrunt Destroy
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt destroy --terragrunt-non-interactive
