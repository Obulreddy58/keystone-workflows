# ---------------------------------------------------------------------------
# Reusable Workflow: Terragrunt Destroy (for infra-live repos)
#
# Called by team repos' destroy.yaml (manual workflow_dispatch).
# ---------------------------------------------------------------------------
name: Terragrunt Destroy

on:
  workflow_call:
    inputs:
      environment:
        description: Environment name such as dev, staging, or prod
        required: true
        type: string
      working_directory:
        description: Directory containing the Terragrunt live config
        required: true
        type: string
      confirm_environment:
        description: Type the environment name to confirm destruction
        required: true
        type: string
      aws_region:
        description: AWS region to target
        required: false
        type: string
        default: eu-central-1
      terraform_version:
        description: Terraform version
        required: false
        type: string
        default: "1.14.0"
      terragrunt_version:
        description: Terragrunt version
        required: false
        type: string
        default: "0.77.22"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TERRAGRUNT_NON_INTERACTIVE: true

jobs:
  destroy:
    name: Terragrunt Destroy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm_environment }}" != "${{ inputs.environment }}" ]; then
            echo "::error::Environment confirmation mismatch. Expected '${{ inputs.environment }}', got '${{ inputs.confirm_environment }}'."
            exit 1
          fi
          echo "Destruction confirmed for: ${{ inputs.working_directory }} (${{ inputs.environment }})"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Export AWS_ROLE_ARN
        run: |
          ROLE_ARN=$(aws sts get-caller-identity --query RoleArn --output text)
          echo "AWS_ROLE_ARN=$ROLE_ARN" >> $GITHUB_ENV

      - name: Terragrunt Init & Destroy Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terragrunt init --terragrunt-non-interactive
          terragrunt plan -destroy --terragrunt-non-interactive -no-color

      - name: Destroy infrastructure
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt destroy --terragrunt-non-interactive -auto-approve
