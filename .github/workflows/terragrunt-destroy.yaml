# ---------------------------------------------------------------------------
# Reusable workflow: Terragrunt Destroy
# Destroys all resources in reverse DAG order (RDS → EKS → VPC)
# ---------------------------------------------------------------------------
name: Terragrunt Destroy

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (e.g. prod)"
        required: true
        type: string
      working_directory:
        description: "Path to the environment folder"
        required: false
        type: string
        default: "environments/prod"
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.10.0"
      terragrunt_version:
        description: "Terragrunt version"
        required: false
        type: string
        default: "0.67.0"
      confirm_environment:
        description: "Type the environment name to confirm destruction"
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  # -------------------------------------------------------------------
  # Safety: Confirm environment name matches
  # -------------------------------------------------------------------
  confirm:
    name: Confirm Destruction
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm_environment }}" != "${{ inputs.environment }}" ]; then
            echo "::error::Environment confirmation mismatch. Expected '${{ inputs.environment }}', got '${{ inputs.confirm_environment }}'."
            exit 1
          fi
          echo "✓ Destruction confirmed for environment: ${{ inputs.environment }}"

  # -------------------------------------------------------------------
  # Plan Destroy (so we can review what will be removed)
  # -------------------------------------------------------------------
  plan-destroy:
    name: Plan Destroy
    runs-on: ubuntu-latest
    needs: [confirm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: terragrunt-destroy-plan-${{ inputs.environment }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ inputs.terragrunt_version }}

      - name: Terragrunt Init
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Plan Destroy
        working-directory: ${{ inputs.working_directory }}
        run: |
          terragrunt run-all plan -destroy \
            -no-color \
            --terragrunt-non-interactive

  # -------------------------------------------------------------------
  # Destroy: reverse DAG order (RDS → EKS → VPC)
  # -------------------------------------------------------------------
  destroy:
    name: Terragrunt Destroy
    runs-on: ubuntu-latest
    needs: [plan-destroy]
    environment: ${{ inputs.environment }}-destroy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: terragrunt-destroy-${{ inputs.environment }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ inputs.terragrunt_version }}

      - name: Terragrunt Init
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Destroy
        working-directory: ${{ inputs.working_directory }}
        run: |
          terragrunt run-all destroy \
            --terragrunt-non-interactive \
            --terragrunt-parallelism 1
          # parallelism=1 ensures strictly sequential reverse DAG:
          # RDS → EKS → VPC
