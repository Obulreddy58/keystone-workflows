# ---------------------------------------------------------------------------
# Reusable Workflow: Terragrunt Apply (for infra-live repos)
#
# Called by team repos' deploy.yaml on merge to main.
# Runs terragrunt apply in the specified working directory.
#
# No local modules/ scanning — modules are sourced remotely
# from keystone-modules via git references in terragrunt.hcl.
# ---------------------------------------------------------------------------
name: Terragrunt Apply

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (e.g. prod, dev)"
        required: true
        type: string
      working_directory:
        description: "Path to the terragrunt module dir"
        required: true
        type: string
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.10.0"
      terragrunt_version:
        description: "Terragrunt version"
        required: false
        type: string
        default: "0.67.0"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: tg-apply-${{ inputs.environment }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ inputs.terragrunt_version }}

      - name: Terragrunt Init
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt init --terragrunt-non-interactive

      - name: Terragrunt Apply
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          # Find the terraform cache dir and run terraform directly to see full errors
          TG_CACHE=$(find .terragrunt-cache -name "*.tf" -path "*/vpc/*" -print -quit 2>/dev/null | xargs dirname 2>/dev/null || echo "")
          if [ -n "$TG_CACHE" ]; then
            echo "Running terraform directly in: $TG_CACHE"
            cd "$TG_CACHE"
            terraform apply -auto-approve -no-color 2>&1
          else
            echo "No cache dir found, running via terragrunt"
            terragrunt apply -auto-approve -no-color --terragrunt-non-interactive --terragrunt-forward-tf-stdout 2>&1
          fi
