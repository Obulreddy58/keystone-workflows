# ---------------------------------------------------------------------------
# Reusable workflow: Terragrunt Apply
# Runs security scans as gates, then applies via DAG ordering
# ---------------------------------------------------------------------------
name: Terragrunt Apply

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (e.g. prod)"
        required: true
        type: string
      working_directory:
        description: "Path to the environment folder"
        required: false
        type: string
        default: "environments/prod"
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.10.0"
      terragrunt_version:
        description: "Terragrunt version"
        required: false
        type: string
        default: "0.67.0"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  # -------------------------------------------------------------------
  # Gate: Security scan before apply
  # -------------------------------------------------------------------
  tfsec:
    name: tfsec Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          additional_args: "--minimum-severity HIGH"
          working_directory: modules/

  checkov:
    name: Checkov Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: "CKV_AWS_144"
          output_format: cli
          download_external_modules: false

  # -------------------------------------------------------------------
  # Apply: Terragrunt run-all apply (DAG-ordered)
  # -------------------------------------------------------------------
  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    needs: [tfsec, checkov]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: terragrunt-apply-${{ inputs.environment }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ inputs.terragrunt_version }}

      - name: Terragrunt Init
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          terragrunt run-all apply \
            --terragrunt-non-interactive \
            --terragrunt-parallelism 1
          # parallelism=1 ensures strictly sequential DAG execution:
          # VPC → EKS → RDS
