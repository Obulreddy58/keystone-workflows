# ---------------------------------------------------------------------------
# Reusable Workflow: Terragrunt Apply (for infra-live repos)
#
# Called by team repos' deploy.yaml on merge to main.
# Runs terragrunt apply in the specified working directory.
#
# No local modules/ scanning — modules are sourced remotely
# from keystone-modules via git references in terragrunt.hcl.
# ---------------------------------------------------------------------------
name: Terragrunt Apply

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (e.g. prod, dev)"
        required: true
        type: string
      working_directory:
        description: "Path to the terragrunt module dir"
        required: true
        type: string
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.14.0"
      terragrunt_version:
        description: Terragrunt version
        required: false
        type: string
        default: "0.77.22"
      aws_region:
        description: AWS region to target
        required: false
        type: string
        default: eu-central-1
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Export AWS_ROLE_ARN
        run: |
          ROLE_ARN=$(aws sts get-caller-identity --query RoleArn --output text)
          echo "AWS_ROLE_ARN=$ROLE_ARN" >> $GITHUB_ENV

      - name: Apply infrastructure
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt apply --terragrunt-non-interactive -auto-approve
