# ---------------------------------------------------------------------------
# Reusable Workflow: Terragrunt Plan (for infra-live repos)
#
# Called by team repos' pull-request.yaml.
# Runs terragrunt plan with formatting check and Checkov guardrails.
# Posts plan output as a PR comment.
# ---------------------------------------------------------------------------
name: Terragrunt Plan

on:
  workflow_call:
    inputs:
      environment:
        description: Environment name such as dev, staging, or prod
        required: true
        type: string
      working_directory:
        description: Directory containing the Terragrunt live config
        required: true
        type: string
      aws_region:
        description: AWS region to target
        required: false
        type: string
        default: eu-central-1
      terraform_version:
        description: Terraform version
        required: false
        type: string
        default: "1.14.0"
      terragrunt_version:
        description: Terragrunt version
        required: false
        type: string
        default: "0.77.22"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TERRAGRUNT_NON_INTERACTIVE: true

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64 -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Check Terragrunt formatting
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt hclfmt --terragrunt-check

      - name: Terragrunt Init & Plan
        id: plan
        continue-on-error: true
        working-directory: ${{ inputs.working_directory }}
        run: |
          terragrunt run-all init --terragrunt-non-interactive -reconfigure
          terragrunt run-all plan -no-color -out tfplan 2>&1 | tee plan_output.txt

      - name: Run Checkov
        if: steps.plan.outcome == 'success'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ inputs.working_directory }}
          framework: terraform
          output_format: cli
          soft_fail: false

      - name: Post Plan to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '${{ inputs.working_directory }}/plan_output.txt';
            let plan = '';
            try { plan = fs.readFileSync(path, 'utf8'); } catch(e) { plan = 'Plan output not available'; }

            const MAX_LEN = 60000;
            if (plan.length > MAX_LEN) {
              plan = plan.substring(0, MAX_LEN) + '\n\n... (truncated)';
            }

            const body = `### Terragrunt Plan — \`${{ inputs.working_directory }}\` (\`${{ inputs.environment }}\`)

            <details>
            <summary>Show Plan Output</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>

            **Pushed by:** @${{ github.actor }}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `Terragrunt Plan — \`${{ inputs.working_directory }}\``;
            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
