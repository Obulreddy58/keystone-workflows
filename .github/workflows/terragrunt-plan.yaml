# ---------------------------------------------------------------------------
# Reusable workflow: Terragrunt Plan
# Runs fmt, validate, tfsec, checkov, and terragrunt plan
# ---------------------------------------------------------------------------
name: Terragrunt Plan

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (e.g. prod)"
        required: true
        type: string
      working_directory:
        description: "Path to the environment folder"
        required: false
        type: string
        default: "environments/prod"
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.10.0"
      terragrunt_version:
        description: "Terragrunt version"
        required: false
        type: string
        default: "0.67.0"
      tfsec_version:
        description: "tfsec version"
        required: false
        type: string
        default: "latest"
      checkov_version:
        description: "Checkov version"
        required: false
        type: string
        default: "latest"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  # -------------------------------------------------------------------
  # Stage 1: Format check
  # -------------------------------------------------------------------
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff modules/

  # -------------------------------------------------------------------
  # Stage 2: Validate
  # -------------------------------------------------------------------
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [fmt]
    strategy:
      matrix:
        module: [vpc, eks, rds, ecs-fargate, ec2, transit-gateway, alb, cloudfront, s3, ecr, oidc-github, msk, waf, lambda, api-gateway, efs, dynamodb, elasticache, route53, eks-addons]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        working-directory: modules/${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: modules/${{ matrix.module }}
        run: terraform validate

  # -------------------------------------------------------------------
  # Stage 3: Security scanning (tfsec + checkov in parallel)
  # -------------------------------------------------------------------
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          version: ${{ inputs.tfsec_version }}
          soft_fail: false
          additional_args: "--minimum-severity HIGH --format lovely"
          working_directory: modules/

  checkov:
    name: Checkov Policy Scan
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: "CKV_AWS_144"  # Skip cross-region replication if not needed
          output_format: cli
          download_external_modules: false

  # -------------------------------------------------------------------
  # Stage 4: Terragrunt Plan
  # -------------------------------------------------------------------
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    needs: [tfsec, checkov]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: terragrunt-plan-${{ inputs.environment }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ inputs.terragrunt_version }}

      - name: Terragrunt Init
        working-directory: ${{ inputs.working_directory }}
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terragrunt run-all plan -no-color --terragrunt-non-interactive 2>&1 | tee plan_output.txt
          echo "plan_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8');

            // Truncate if too long for PR comment
            const MAX_LEN = 60000;
            if (plan.length > MAX_LEN) {
              plan = plan.substring(0, MAX_LEN) + '\n\n... (truncated)';
            }

            const body = `### Terragrunt Plan — \`${{ inputs.environment }}\`

            <details>
            <summary>Show Plan Output</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>

            **Pushed by:** @${{ github.actor }}
            **Action:** \`${{ github.event_name }}\``;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terragrunt Plan')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outputs.plan_exit_code != '0'
        run: exit 1
